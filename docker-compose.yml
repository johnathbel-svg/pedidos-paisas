version: '3.8'

services:
  app:
    container_name: pedidos-paisas-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    # For local development with hot-reload, you'd mount volumes. 
    # For PoC/Production deployment (this file), we rely on the built image.
    command: node server.js

  # Optional: Watchtower for auto-updates if we use a registry later
  # watchtower:
  #   image: containrrr/watchtower
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 300
